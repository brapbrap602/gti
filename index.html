<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>    
    <link rel="stylesheet" href="assets/style.css">

</head>
<body>

    <div class="calibre">
        <div class="library-header">
            <h1>My Library</h1>
        </div>

        <!-- The Javascript will inject the books here -->
        <div id="library-container" class="book-list">
            <div class="status-msg">Loading library...</div>
        </div>
    </div>

    <!-- Scroll to top button -->
    <button class="scroll-to-top" id="scrollToTopBtn" aria-label="Scroll to top"></button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Library loader ---
            const container = document.getElementById('library-container');

            fetch('data/library.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(books => {
                    container.innerHTML = ''; // Clear "Loading..."

                    if (!books || books.length === 0) {
                        container.innerHTML = '<div class="status-msg">No books found. Please run the python script.</div>';
                        return;
                    }

                    // Group entries by novel title
                    const novels = new Map();
                    books.forEach(book => {
                        const key = book.novel || book.title;
                        if (!novels.has(key)) novels.set(key, []);
                        novels.get(key).push(book);
                    });

                    novels.forEach((parts, novelName) => {
                        const card = document.createElement('div');
                        card.className = 'book-card';

                        const titleEl = document.createElement('h2');
                        titleEl.className = 'book-title';
                        titleEl.textContent = novelName;
                        card.appendChild(titleEl);

                        if (parts.length === 1) {
                            // Single entry — whole card is a link
                            const link = document.createElement('a');
                            link.href = parts[0].path;
                            link.className = 'book-link';
                            link.appendChild(card);
                            container.appendChild(link);
                        } else {
                            // Multiple parts — show chapter-range pills
                            const pills = document.createElement('div');
                            pills.className = 'book-parts';
                            parts.forEach(part => {
                                const pill = document.createElement('a');
                                pill.href = part.path;
                                pill.className = 'book-part-link';
                                const ch = part.chapters;
                                pill.textContent = ch ? `Chs ${ch.start}–${ch.end}` : part.title;
                                pills.appendChild(pill);
                            });
                            card.appendChild(pills);
                            container.appendChild(card);
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading library:', error);
                    const msg = document.createElement('div');
                    msg.className = 'status-msg status-msg--error';
                    msg.innerHTML = `Error loading library.json.<br><small>${error.message}</small>`;
                    container.innerHTML = '';
                    container.appendChild(msg);
                });

            // --- Scroll to top ---
            const scrollToTopBtn = document.getElementById('scrollToTopBtn');

            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    scrollToTopBtn.classList.add('visible');
                } else {
                    scrollToTopBtn.classList.remove('visible');
                }
            });

            scrollToTopBtn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>

</body>
</html>
